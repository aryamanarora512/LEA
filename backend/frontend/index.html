// ── Weekly Digest Trigger Component ───────────────────────────────────────────
function WeeklyDigestTrigger() {
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState(null);
  const [error,   setError]   = useState("");

  const TOP_MARKETS = [
    {city:"Miami",         state:"FL"},
    {city:"Atlanta",       state:"GA"},
    {city:"New York",      state:"NY"},
    {city:"Chicago",       state:"IL"},
    {city:"Tampa",         state:"FL"},
    {city:"Houston",       state:"TX"},
    {city:"Dallas",        state:"TX"},
    {city:"Los Angeles",   state:"CA"},
    {city:"Philadelphia",  state:"PA"},
    {city:"Charlotte",     state:"NC"},
  ];

  async function run() {
    setLoading(true); setError(""); setResult(null);
    try {
      const resp = await fetch("/api/digest", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          markets: TOP_MARKETS.map(m => ({...m, practice_area:"personal injury"})),
          max_per_market: 5
        })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || "Digest failed");
      setResult(data);
    } catch(e) { setError(e.message); }
    finally    { setLoading(false); }
  }

  return (
    <div>
      <button onClick={run} disabled={loading}
        style={{padding:"8px 18px",borderRadius:8,border:"none",background:loading?"#F3F4F6":"#111827",color:loading?"#9CA3AF":"white",fontSize:12,fontWeight:700,cursor:loading?"not-allowed":"pointer",display:"inline-flex",alignItems:"center",gap:7,marginBottom:10}}>
        {loading ? <><Spinner size={11} color="#9CA3AF"/> Running digest across {TOP_MARKETS.length} markets…</> : "▶ Run Weekly Digest Now"}
      </button>
      {error && <div style={{fontSize:11,color:"#DC2626",marginBottom:8}}>{error}</div>}
      {result && (
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:8}}>
            Digest complete — {new Date().toLocaleString()} · {(result.markets||[]).length} markets scanned
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8,maxHeight:300,overflowY:"auto"}}>
            {(result.markets||[]).map((mkt,i) => (
              <div key={i} style={{background:"#F9FAFB",borderRadius:8,padding:"10px 12px",border:"1px solid #F3F4F6"}}>
                <div style={{fontSize:11,fontWeight:800,color:"#374151",marginBottom:6}}>{mkt.market}</div>
                {(mkt.top_firms||[]).slice(0,3).map((f,j) => (
                  <div key={j} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <span style={{fontSize:9,fontWeight:800,color:"#9CA3AF",width:16}}>#{j+1}</span>
                    <span style={{fontSize:11,fontWeight:600,color:"#111827",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                    {f.rule_score != null && (
                      <span style={{fontSize:9,fontWeight:700,color:"#4F46E5",flexShrink:0}}>{Math.round(f.rule_score)}</span>
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ManagePage({ watchlist, crmData, setCrmData }) {
  // ── Local CRM state ──────────────────────────────────────
  const [view,     setView]     = useState("table");
  const [selected, setSelected] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [sortCol,  setSortCol]  = useState("name");
  const [sortDir,  setSortDir]  = useState("asc");
  const [newsMap,  setNewsMap]  = useState({});
  const [loadingNews, setLoadingNews] = useState(null);

  // ── Monday.com state ─────────────────────────────────────
  const [mode,          setMode]          = useState("local");   // "local" | "monday"
  const [tokenInput,    setTokenInput]    = useState("");
  const [mondayToken,   setMondayToken]   = useState("");
  const [mondayBoards,  setMondayBoards]  = useState(null);
  const [mondayBoardId, setMondayBoardId] = useState("");
  const [mondayBoard,   setMondayBoard]   = useState(null);
  const [mondayLoading, setMondayLoading] = useState(false);
  const [mondayError,   setMondayError]   = useState("");
  const [showToken,     setShowToken]     = useState(false);

  // ── Local CRM helpers ────────────────────────────────────
  const isDemo   = watchlist.length === 0;
  const allFirms = isDemo ? SAMPLE_FIRMS : watchlist;

  function getCrm(f) {
    const key = `${f.name}|${f.city}`;
    if (isDemo) return SAMPLE_CRM[key] || { stage:"prospect", emailStatus:"not_sent", notes:"", activities:[], dateAdded:"—" };
    return crmData[key]              || { stage:"prospect", emailStatus:"not_sent", notes:"", activities:[], dateAdded:"—" };
  }
  function updateCrm(firm, patch) {
    if (isDemo) return;
    const key = `${firm.name}|${firm.city}`;
    setCrmData(d => ({ ...d, [key]: { ...d[key], ...patch } }));
  }
  function setEmailStatus(firm, st) {
    const activity = `${new Date().toLocaleDateString()} — Email: ${emailLabel[st]}`;
    updateCrm(firm, { emailStatus: st, activities:[...(getCrm(firm).activities||[]), activity] });
  }
  function advanceStage(firm, e) {
    e?.stopPropagation();
    const stages = CRM_STAGES.map(s=>s.id);
    const cur  = getCrm(firm).stage || "prospect";
    const next = stages[Math.min(stages.indexOf(cur)+1, stages.length-1)];
    const label = CRM_STAGES.find(s=>s.id===next)?.label;
    updateCrm(firm, { stage:next, activities:[...(getCrm(firm).activities||[]), `${new Date().toLocaleDateString()} — Moved to ${label}`] });
  }
  async function loadNews(firm) {
    const key = `${firm.name}|${firm.city}`;
    setLoadingNews(key);
    try {
      const resp = await fetch("/api/scrape", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ firm_name:firm.name, city:firm.city, state:firm.state||"", source_key:"news_press" })
      });
      const data = await resp.json();
      setNewsMap(m => ({ ...m, [key]: data.result?.articles || [] }));
    } catch { setNewsMap(m => ({ ...m, [key]: [] })); }
    finally  { setLoadingNews(null); }
  }

  const emailDotColor = { not_sent:"#D1D5DB", sent:"#D97706", responded:"#16A34A", no_response:"#DC2626" };
  const emailLabel    = { not_sent:"Not Sent", sent:"Sent",  responded:"Responded", no_response:"No Response" };

  // ── Monday.com helpers ───────────────────────────────────
  async function connectMonday() {
    if (!tokenInput.trim()) return;
    setMondayLoading(true); setMondayError("");
    try {
      const resp = await fetch("/api/monday/boards", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ token: tokenInput.trim() })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || "Connection failed");
      setMondayToken(tokenInput.trim());
      setMondayBoards(data.boards);
      setShowToken(false);
      if (data.boards.length > 0) {
        const firstId = String(data.boards[0].id);
        setMondayBoardId(firstId);
        fetchMondayBoard(firstId, tokenInput.trim());
      }
    } catch(e) { setMondayError(e.message); }
    finally    { setMondayLoading(false); }
  }
  async function fetchMondayBoard(boardId, token) {
    setMondayLoading(true); setMondayError("");
    try {
      const resp = await fetch("/api/monday/items", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ token: token||mondayToken, board_id: boardId })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || "Failed to load board");
      setMondayBoard(data.board);
    } catch(e) { setMondayError(e.message); }
    finally    { setMondayLoading(false); }
  }

  // Map a Monday.com item's column_values to a readable object
  function parseMondayItem(item, columns) {
    const cv = {};
    (item.column_values||[]).forEach(col => {
      const colDef = columns.find(c=>c.id===col.id);
      const title  = colDef?.title || col.id;
      cv[title]    = col.text || "";
    });
    return cv;
  }

  // Find the "status" column value for an item (Monday.com's colored pill column)
  function getMondayStatus(item, columns) {
    const statusCol = columns.find(c=>c.type==="color"||c.type==="status"||c.title?.toLowerCase().includes("status")||c.title?.toLowerCase().includes("stage"));
    if (!statusCol) return "";
    const cv = (item.column_values||[]).find(c=>c.id===statusCol.id);
    return cv?.text || "";
  }

  // ── Stats (local) ────────────────────────────────────────
  const total     = allFirms.length;
  const contacted = allFirms.filter(f=>getCrm(f).emailStatus!=="not_sent").length;
  const responded = allFirms.filter(f=>getCrm(f).emailStatus==="responded").length;
  const closed    = allFirms.filter(f=>getCrm(f).stage==="closed").length;

  // ── Sorted firms (local table) ───────────────────────────
  const sortedFirms = [...allFirms].sort((a,b) => {
    let av, bv;
    if      (sortCol==="name")    { av=a.name; bv=b.name; }
    else if (sortCol==="rating")  { av=a.google_stars||0; bv=b.google_stars||0; }
    else if (sortCol==="reviews") { av=a.google_review_count||0; bv=b.google_review_count||0; }
    else if (sortCol==="attys")   { av=a.attorney_count||0; bv=b.attorney_count||0; }
    else if (sortCol==="stage")   { av=CRM_STAGES.findIndex(s=>s.id===getCrm(a).stage); bv=CRM_STAGES.findIndex(s=>s.id===getCrm(b).stage); }
    else { av=a.name; bv=b.name; }
    if (typeof av==="string") return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return sortDir==="asc"?av-bv:bv-av;
  });

  function SortTh({ col, label, style={} }) {
    const active = sortCol===col;
    return (
      <th onClick={()=>{ if(active) setSortDir(d=>d==="asc"?"desc":"asc"); else{setSortCol(col);setSortDir("asc");} }}
        style={{ padding:"10px 14px", textAlign:"left", fontSize:11, fontWeight:700,
                 color:active?"#4F46E5":"#6B7280", textTransform:"uppercase", letterSpacing:"0.05em",
                 cursor:"pointer", userSelect:"none", background:"#F8F9FB",
                 borderBottom:"2px solid #E5E7EB", whiteSpace:"nowrap", ...style }}>
        {label} {active?(sortDir==="asc"?"↑":"↓"):""}
      </th>
    );
  }

  // ── Monday.com items table ───────────────────────────────
  const mondayItems   = mondayBoard?.items_page?.items || [];
  const mondayColumns = mondayBoard?.columns || [];
  // Determine which columns to show (skip system/formula types, limit to 5)
  const displayCols = mondayColumns
    .filter(c => !["formula","mirror","dependency","button","doc"].includes(c.type))
    .filter(c => c.title !== "Name")
    .slice(0, 5);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:"#F8F9FB"}}>

      {/* ── Top bar ── */}
      <div style={{background:"white",borderBottom:"1px solid #E5E7EB",padding:"0 20px",flexShrink:0}}>
        {/* Title row */}
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 0 10px",flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:"#111827",letterSpacing:"-0.02em"}}>
              {mode==="monday" && mondayBoard ? mondayBoard.name : "Pipeline Board"}
            </div>
            <div style={{fontSize:12,color:"#9CA3AF",marginTop:1}}>
              {mode==="monday"
                ? (mondayBoard ? `${mondayItems.length} items from Monday.com` : "Connect your Monday.com account below")
                : (isDemo ? "Demo mode — add firms from Discover to populate your real pipeline" : `${total} firms tracked`)}
            </div>
          </div>
          {isDemo && mode==="local" && (
            <span style={{background:"#FEF3C7",color:"#D97706",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,border:"1px solid #FDE68A"}}>Demo</span>
          )}

          {/* Source mode toggle */}
          <div style={{display:"flex",background:"#F3F4F6",borderRadius:8,padding:3,gap:2}}>
            {[["local","📋  Local CRM"],["monday","☰  Monday.com"]].map(([v,lbl])=>(
              <button key={v} onClick={()=>setMode(v)}
                style={{ padding:"5px 14px",borderRadius:6,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",
                         background:mode===v?"white":"transparent", color:mode===v?"#4F46E5":"#6B7280",
                         boxShadow:mode===v?"0 1px 4px rgba(0,0,0,0.08)":"none" }}>
                {lbl}
              </button>
            ))}
          </div>

          {/* Local CRM view toggle (only in local mode) */}
          {mode==="local" && (
            <div style={{display:"flex",background:"#F3F4F6",borderRadius:8,padding:3,gap:2}}>
              {[["table","☰  Table"],["board","⊞  Board"]].map(([v,lbl])=>(
                <button key={v} onClick={()=>setView(v)}
                  style={{ padding:"5px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",
                           background:view===v?"white":"transparent", color:view===v?"#4F46E5":"#6B7280",
                           boxShadow:view===v?"0 1px 4px rgba(0,0,0,0.08)":"none" }}>
                  {lbl}
                </button>
              ))}
            </div>
          )}

          {/* Monday.com board selector (when connected) */}
          {mode==="monday" && mondayBoards && (
            <select value={mondayBoardId}
              onChange={e=>{ setMondayBoardId(e.target.value); fetchMondayBoard(e.target.value, mondayToken); }}
              style={{padding:"6px 10px",borderRadius:7,border:"1px solid #E5E7EB",fontSize:12,fontWeight:600,color:"#374151",background:"white",cursor:"pointer"}}>
              {mondayBoards.map(b=>(
                <option key={b.id} value={String(b.id)}>{b.name} ({b.items_count} items)</option>
              ))}
            </select>
          )}
          {mode==="monday" && mondayToken && (
            <button onClick={()=>fetchMondayBoard(mondayBoardId, mondayToken)} disabled={mondayLoading}
              style={{padding:"6px 12px",borderRadius:7,border:"1px solid #E5E7EB",background:"white",fontSize:12,fontWeight:700,color:"#374151",cursor:"pointer"}}>
              {mondayLoading ? "Loading…" : "↻ Refresh"}
            </button>
          )}
          {mode==="monday" && mondayToken && (
            <button onClick={()=>{ setMondayToken(""); setMondayBoards(null); setMondayBoard(null); setShowToken(true); }}
              style={{padding:"6px 12px",borderRadius:7,border:"1px solid #FECACA",background:"#FFF5F5",fontSize:12,fontWeight:700,color:"#DC2626",cursor:"pointer"}}>
              Disconnect
            </button>
          )}
        </div>

        {/* Stats row (local CRM) */}
        {mode==="local" && (
          <div style={{display:"flex",gap:0,borderTop:"1px solid #F3F4F6"}}>
            {[
              {label:"Total Firms",   value:total,     color:"#4F46E5"},
              {label:"Contacted",     value:contacted, color:"#D97706"},
              {label:"Responded",     value:responded, color:"#16A34A"},
              {label:"Response Rate", value:contacted>0?`${Math.round((responded/contacted)*100)}%`:"—", color:"#7C3AED"},
              {label:"Closed",        value:closed,    color:"#0EA5E9"},
            ].map(s=>(
              <div key={s.label} style={{padding:"8px 18px",display:"flex",alignItems:"center",gap:8,borderRight:"1px solid #F3F4F6"}}>
                <span style={{fontSize:20,fontWeight:800,color:s.color}}>{s.value}</span>
                <span style={{fontSize:11,color:"#9CA3AF",fontWeight:500}}>{s.label}</span>
              </div>
            ))}
          </div>
        )}

        {/* Monday.com stats row (when connected) */}
        {mode==="monday" && mondayBoard && (
          <div style={{display:"flex",gap:0,borderTop:"1px solid #F3F4F6"}}>
            <div style={{padding:"8px 18px",display:"flex",alignItems:"center",gap:8,borderRight:"1px solid #F3F4F6"}}>
              <span style={{fontSize:20,fontWeight:800,color:"#F62E7B"}}>{mondayItems.length}</span>
              <span style={{fontSize:11,color:"#9CA3AF",fontWeight:500}}>Items</span>
            </div>
            <div style={{padding:"8px 18px",display:"flex",alignItems:"center",gap:8,borderRight:"1px solid #F3F4F6"}}>
              <span style={{fontSize:20,fontWeight:800,color:"#4F46E5"}}>{mondayColumns.length}</span>
              <span style={{fontSize:11,color:"#9CA3AF",fontWeight:500}}>Columns</span>
            </div>
            <div style={{padding:"8px 18px",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"#9CA3AF"}}>Board: <b style={{color:"#374151"}}>{mondayBoard.name}</b></span>
            </div>
            <div style={{marginLeft:"auto",padding:"8px 18px",display:"flex",alignItems:"center"}}>
              <a href="https://monday.com" target="_blank" rel="noopener"
                style={{fontSize:11,fontWeight:700,color:"#F62E7B",textDecoration:"none",display:"flex",alignItems:"center",gap:4}}>
                Open in Monday.com ↗
              </a>
            </div>
          </div>
        )}
      </div>

      {/* ── Content ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* ══════════════════════════════════════════════════
            MONDAY.COM MODE
        ══════════════════════════════════════════════════ */}
        {mode==="monday" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

            {/* Connect panel (shown when not connected) */}
            {!mondayToken && (
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:40}}>
                <div style={{maxWidth:520,width:"100%",background:"white",borderRadius:16,padding:36,boxShadow:"0 4px 24px rgba(0,0,0,0.08)",border:"1px solid #F3F4F6",textAlign:"center"}}>
                  {/* Monday.com logo-style badge */}
                  <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#F62E7B,#FF6B6B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px",boxShadow:"0 4px 16px rgba(246,46,123,0.3)"}}>
                    ☰
                  </div>
                  <div style={{fontSize:20,fontWeight:800,color:"#111827",marginBottom:8}}>Connect Monday.com</div>
                  <div style={{fontSize:13,color:"#6B7280",lineHeight:1.6,marginBottom:28}}>
                    Pull your real board data — items, statuses, and columns — directly into this pipeline view.
                    Your API token stays local and is never stored.
                  </div>

                  <div style={{textAlign:"left",marginBottom:16}}>
                    <label style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6}}>
                      Monday.com API Token
                    </label>
                    <div style={{display:"flex",gap:8}}>
                      <input
                        type={showToken?"text":"password"}
                        value={tokenInput}
                        onChange={e=>setTokenInput(e.target.value)}
                        onKeyDown={e=>e.key==="Enter"&&connectMonday()}
                        placeholder="Paste your v2 API token…"
                        style={{flex:1,padding:"10px 14px",border:"1px solid #E5E7EB",borderRadius:8,fontSize:13,color:"#111827",outline:"none"}}
                      />
                      <button onClick={()=>setShowToken(v=>!v)}
                        style={{padding:"10px 12px",border:"1px solid #E5E7EB",borderRadius:8,background:"white",cursor:"pointer",fontSize:13,color:"#6B7280"}}>
                        {showToken?"🙈":"👁"}
                      </button>
                    </div>
                  </div>

                  {mondayError && (
                    <div style={{background:"#FFF5F5",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#DC2626",marginBottom:16,textAlign:"left"}}>
                      ⚠ {mondayError}
                    </div>
                  )}

                  <button onClick={connectMonday} disabled={mondayLoading||!tokenInput.trim()}
                    style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:mondayLoading||!tokenInput.trim()?"#E5E7EB":"linear-gradient(135deg,#F62E7B,#FF6B6B)",color:mondayLoading||!tokenInput.trim()?"#9CA3AF":"white",fontSize:14,fontWeight:700,cursor:mondayLoading||!tokenInput.trim()?"not-allowed":"pointer",transition:"opacity 0.2s"}}>
                    {mondayLoading ? "Connecting…" : "Connect →"}
                  </button>

                  <div style={{marginTop:18,fontSize:12,color:"#9CA3AF",lineHeight:1.6}}>

                    <a href="https://monday.com/apps/manage/tokens" target="_blank" rel="noopener" style={{color:"#F62E7B",fontWeight:600}}>

                    {" "}→ Developer → API v2 token

            {/* Monday.com board table */}
            {mondayToken && mondayBoard && (
              <div style={{flex:1,overflowY:"auto"}}>

                        "done":"#00C875", "working on it":"#FDAB3D", "stuck":"#DF2F4A",

                        "prospect":"#7B68EE", "contacted":"#FDAB3D", "responded":"#00C875",

            LOCAL CRM MODE

        {mode==="local" && (
          <div style={{flex:1,display:"flex",overflow:"hidden"}}>

            {/* TABLE VIEW */}

                      <OutreachPanel firm={selected} enriched={null}/>

            })()}

        )}
      </div>
    </div>
  );
}

          </div>
          <div>
            <div style={{fontSize:17,fontWeight:900,color:"#111827"}}>LEA Investment Intelligence</div>
            <div style={{fontSize:11,color:"#9CA3AF"}}>Select your name to continue</div>
          </div>
        </div>
        <div style={{height:1,background:"#F3F4F6",margin:"18px 0"}}/>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {users.map(u => (
            <button key={u} onClick={()=>setPicked(u)}
              style={{padding:"11px 16px",borderRadius:9,border:"2px solid",textAlign:"left",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all 0.12s",

                background:  picked===u ? "#111827" : "white",

            </button>

        <button onClick={()=>{ if(picked) onSelect(picked); }}
          disabled={!picked}
          style={{marginTop:18,width:"100%",padding:"12px 0",borderRadius:9,border:"none",background:picked?"#111827":"#E5E7EB",color:picked?"white":"#9CA3AF",fontSize:14,fontWeight:800,cursor:picked?"pointer":"not-allowed",transition:"all 0.15s"}}>
          Continue as {picked||"…"}
        </button>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [tab,         setTab]         = useState("discover");
  const [watchlist,   setWatchlist]   = useState([]);
  const [crmData,     setCrmData]     = useState({});
  const [currentUser, setCurrentUser] = useState(() => localStorage.getItem("lea_username") || "");
  const [userLoading, setUserLoading] = useState(false);
  const saveTimerRef = React.useRef(null);

  // ── User login: load data from backend ──────────────────────────────────────
  async function handleUserSelect(username) {
    localStorage.setItem("lea_username", username);
    setCurrentUser(username);
    setUserLoading(true);
    try {
      const resp = await fetch("/api/user/" + encodeURIComponent(username) + "/load");
      const data = await resp.json();
      if (data.watchlist && data.watchlist.length > 0) setWatchlist(data.watchlist);
      if (data.crm_data && Object.keys(data.crm_data).length > 0) setCrmData(data.crm_data);
    } catch(e) { console.error("load user data failed", e); }
    finally { setUserLoading(false); }
  }

  // Auto-save watchlist + CRM to backend whenever they change (debounced 2s)
  React.useEffect(() => {
    if (!currentUser) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      fetch("/api/user/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username: currentUser, watchlist, crm_data: crmData})
      }).catch(e => console.error("auto-save failed", e));
    }, 2000);
    return () => clearTimeout(saveTimerRef.current);
  }, [watchlist, crmData, currentUser]);

  // Discover state lifted here so results persist across tab switches
  const [discoverMode,      setDiscoverMode]      = useState("search");
  const [discoverForm,      setDiscoverForm]      = useState({city:"",state:"FL",practice_area:"personal injury",max_results:60});
  const [discoverCForm,     setDiscoverCForm]     = useState({city:"",state:"FL",practice_area:"personal injury",days_back:180});
  const [discoverResults,   setDiscoverResults]   = useState(null);
  const [discoverAnalytics, setDiscoverAnalytics] = useState(null);
  const [discoverSelected,  setDiscoverSelected]  = useState(null);
  const [discoverError,     setDiscoverError]     = useState("");
  const [enrichCache,   setEnrichCache]   = useState({});
  const [notification,  setNotification]  = useState(null);

  function showNotification(msg, type) {
    setNotification({msg, type: type||"success"});
    setTimeout(() => setNotification(null), 4000);
  }

  async function autoEnrich(firm) {
    const key = firm.name + "|" + firm.city;
    if (enrichCache[key]) return;
    try {
      const resp = await fetch("/api/discover/enrich", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({name:firm.name, website:firm.website||"", city:firm.city, state:firm.state||""})
      });
      const data = await resp.json();
      setEnrichCache(c => ({...c, [key]: data}));
      setWatchlist(w => w.map(f => (f.name===firm.name&&f.city===firm.city) ? {...f, ...data, source:f.source} : f));
      showNotification(firm.name + " enriched automatically");
    } catch(e) { console.error("auto-enrich error", e); }
  }

  function onToggleWatchlist(firm) {
    const key = f => `${f.name}|${f.city}`;
    const exists = watchlist.some(w => key(w)===key(firm));
    if (exists) {
      setWatchlist(w => w.filter(f => key(f)!==key(firm)));
    } else {
      setWatchlist(w => [...w, firm]);
      // Set initial CRM stage
      setCrmData(d => ({ ...d, [key(firm)]: { stage:"prospect", emailStatus:"not_sent", notes:"", activities:[`${new Date().toLocaleDateString()} — Added to watchlist`], dateAdded:new Date().toLocaleDateString() } }));
      autoEnrich(firm);
      showNotification("Saved! Auto-enriching " + firm.name + "…", "info");
    }
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {!currentUser && <UserPickerModal onSelect={handleUserSelect}/>}
      {userLoading && (
        <div style={{position:"fixed",inset:0,background:"rgba(255,255,255,0.8)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,flexDirection:"column",gap:12}}>
          <Spinner color="#111827"/>
          <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>Loading your workspace…</div>
        </div>
      )}
      <Header tab={tab} setTab={setTab} watchlistCount={watchlist.length} currentUser={currentUser} onSwitchUser={()=>{ localStorage.removeItem("lea_username"); setCurrentUser(""); setWatchlist([]); setCrmData({}); }}/>
      {notification && (
        <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,
          background: notification.type==="info" ? "#1D4ED8" : notification.type==="error" ? "#DC2626" : "#059669",
          color:"white",borderRadius:10,padding:"11px 18px",boxShadow:"0 4px 20px rgba(0,0,0,0.2)",
          fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:10,maxWidth:320,
          animation:"slideRight 0.25s ease"}}>
          <span>{notification.type==="info"?"⟳":notification.type==="error"?"✕":"✓"}</span>
          <span style={{flex:1}}>{notification.msg}</span>
          <button onClick={()=>setNotification(null)} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:5,color:"white",padding:"2px 7px",cursor:"pointer",fontSize:11,fontWeight:800}}>×</button>
        </div>
      )}
      <div style={{flex:1,display:"flex",overflow:"hidden",background:"#F7F8FA"}}>
        {tab==="discover"  && <DiscoverPage
          watchlist={watchlist} onToggleWatchlist={onToggleWatchlist} currentUser={currentUser}
          mode={discoverMode}           setMode={setDiscoverMode}
          form={discoverForm}           setForm={setDiscoverForm}
          cForm={discoverCForm}         setCForm={setDiscoverCForm}
          results={discoverResults}     setResults={setDiscoverResults}
          analytics={discoverAnalytics} setAnalytics={setDiscoverAnalytics}
          selected={discoverSelected}   setSelected={setDiscoverSelected}
          error={discoverError}         setError={setDiscoverError}
        />}
        {tab==="watchlist" && <WatchlistPage watchlist={watchlist} onToggleWatchlist={onToggleWatchlist} onGoToManage={()=>setTab("manage")} currentUser={currentUser}/>}
        {tab==="manage"    && <ManagePage    watchlist={watchlist} crmData={crmData} setCrmData={setCrmData}/>}
        {tab==="heatmap"  && <HeatMapPage   watchlist={watchlist} onGoToDiscover={()=>setTab("discover")} onSelectFirm={firm=>{ setDiscoverResults({results:[firm]}); setDiscoverSelected(firm); setTab("discover"); }}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
