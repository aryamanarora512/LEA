<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LEA — Legal Investment Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: #F7F8FA; color: #111827; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
  @keyframes spin      { to { transform: rotate(360deg); } }
  @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
  @keyframes slideRight{ from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
  input, select, textarea, button { font-family: inherit; }
  .res-row:hover  { background: #F5F7FF !important; cursor: pointer; }
  .res-row.active { background: #EEF2FF !important; }
  .wl-row:hover   { background: #F9FAFB !important; cursor: pointer; }
  .wl-row.active  { background: #EEF2FF !important; }
  .crm-card { cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; }
  .crm-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.10) !important; transform: translateY(-2px); }
  .crm-card.active { outline: 2px solid #6366F1; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: #F3F4F6; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = "https://lea-production.up.railway.app/api";

const SCRAPER_CONFIG = [
  { key:"courtlistener", source:"CourtListener",      variable:"Federal case filings & dockets",  freq:"Monthly",   color:"#1D4ED8", bg:"#EFF6FF" },
  { key:"google_places",  source:"Google Places",      variable:"Star rating & review count",      freq:"Monthly",   color:"#16A34A", bg:"#F0FFF4" },
  { key:"avvo",           source:"Avvo",               variable:"Attorney rating (1–10 scale)",    freq:"Monthly",   color:"#9333EA", bg:"#FAF5FF" },
  { key:"sec_edgar",      source:"SEC EDGAR",          variable:"M&A transactions advised",        freq:"Monthly",   color:"#059669", bg:"#ECFDF5" },
  { key:"news_press",     source:"NewsAPI",            variable:"Total press mention count",       freq:"Weekly",    color:"#D97706", bg:"#FFFBEB" },
  { key:"news_wins",      source:"NewsAPI",            variable:"Notable case wins / verdicts",    freq:"Weekly",    color:"#D97706", bg:"#FFFBEB" },
  { key:"news_negative",  source:"NewsAPI",            variable:"Negative press & controversy",    freq:"Weekly",    color:"#DC2626", bg:"#FEF2F2" },
  { key:"news_laterals",  source:"NewsAPI",            variable:"Lateral hires & departures",      freq:"Monthly",   color:"#D97706", bg:"#FFFBEB" },
  { key:"firm_website",   source:"Firm Website",       variable:"Headcount, CRM, practice areas", freq:"Quarterly", color:"#7C3AED", bg:"#F5F3FF" },
  { key:"state_bar",      source:"State Bar",          variable:"Bar admission year & discipline", freq:"Monthly",   color:"#1D4ED8", bg:"#EFF6FF" },
  { key:"martindale",     source:"Martindale-Hubbell", variable:"AV Preeminent status",           freq:"Quarterly", color:"#9333EA", bg:"#FAF5FF" },
  { key:"linkedin",       source:"LinkedIn",           variable:"Headcount & hiring signals",      freq:"Monthly",   color:"#7C3AED", bg:"#F5F3FF" },
];
const PRACTICE_OPTIONS = [
  "personal injury","auto accident","workers compensation","immigration",
  "bankruptcy","criminal defense","family law","medical malpractice",
  "employment law","real estate","business law","estate planning",
  "civil litigation","social security",
];
const US_STATES = ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN",
  "IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY",
  "NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];
const CRM_STAGES = [
  { id:"prospect",   label:"Prospect",   color:"#6B7280", bg:"#F3F4F6", border:"#D1D5DB" },
  { id:"contacted",  label:"Contacted",  color:"#D97706", bg:"#FFFBEB", border:"#FDE68A" },
  { id:"followup",   label:"Follow-up",  color:"#7C3AED", bg:"#F5F3FF", border:"#DDD6FE" },
  { id:"responded",  label:"Responded",  color:"#1D4ED8", bg:"#EFF6FF", border:"#BFDBFE" },
  { id:"closed",     label:"Closed",     color:"#16A34A", bg:"#F0FDF4", border:"#BBF7D0" },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function Spinner({ size=28, color="#111827" }) {
  return <div style={{width:size,height:size,border:`3px solid #E5E7EB`,borderTopColor:color,borderRadius:"50%",animation:"spin .7s linear infinite"}}/>;
}
function FirmAvatar({ name, size=36, bg="#111827", fontSize=14 }) {
  return (
    <div style={{width:size,height:size,borderRadius:Math.round(size*0.25),background:bg,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize}}>
      {(name||"?").charAt(0).toUpperCase()}
    </div>
  );
}
function Stars({ rating, reviewCount, source }) {
  if (!rating) return null;
  return (
    <span style={{fontSize:12,color:"#F59E0B",display:"inline-flex",alignItems:"center",gap:3}}>
      ★ {rating.toFixed(1)}
      <span style={{fontSize:11,color:"#9CA3AF",fontWeight:400}}>
        ({reviewCount ? (reviewCount).toLocaleString() : "?"} {source||"Google"} reviews)
      </span>
    </span>
  );
}

// ── ScraperCard + DataSourcesPanel ────────────────────────────────────────────
function ResultPreview({ result }) {
  if (!result) return null;
  const r = result.result || result;
  if (r.error) return <div style={{fontSize:11,color:"#D97706",marginTop:6,padding:"3px 8px",background:"#FFFBEB",borderRadius:4}}>⚠ {r.error.slice(0,80)}</div>;
  if (r.total_cases_found!=null||r.courtlistener_case_count!=null) return <div style={{fontSize:11,color:"#374151",marginTop:5}}><b>{r.total_cases_found??r.courtlistener_case_count}</b> federal cases</div>;
  if (r.google_stars!=null) return <div style={{fontSize:11,color:"#374151",marginTop:5}}>⭐ <b>{r.google_stars}</b> ({r.google_review_count||0} reviews)</div>;
  if (r.avvo_rating!=null) return <div style={{fontSize:11,color:"#374151",marginTop:5}}>AVVO <b>{r.avvo_rating||"N/A"}</b>/10</div>;
  if (r.total_articles!=null) return <div style={{fontSize:11,color:"#374151",marginTop:5}}><b>{r.total_articles}</b> articles</div>;
  if (r.linkedin_headcount!=null||r.linkedin_headcount_range!=null) return <div style={{fontSize:11,color:"#374151",marginTop:5}}><b>{r.linkedin_headcount_range||r.linkedin_headcount+" employees"}</b>{r.linkedin_hiring?" · Hiring":""}</div>;
  if (r.av_preeminent!=null) return <div style={{fontSize:11,color:"#374151",marginTop:5}}>{r.av_preeminent?"AV Preeminent":"No AV rating"}</div>;
  return null;
}

function ScraperCard({ cfg, firmId, lastResult }) {
  const [status, setStatus] = useState("idle");
  const [result, setResult] = useState(lastResult||null);
  const pollerRef = useRef(null);
  useEffect(()=>{ if(lastResult){ setResult(lastResult); setStatus("done"); } },[lastResult]);
  useEffect(()=>()=>{ if(pollerRef.current) clearInterval(pollerRef.current); },[]);
  async function run() {
    setStatus("running");
    try {
      const d = await fetch(`${API}/scrape`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({firm_id:firmId,source_key:cfg.key})}).then(r=>r.json());
      if(d.error){ setStatus("error"); return; }
      pollerRef.current = setInterval(async()=>{
        const jr = await fetch(`${API}/scrape_jobs/${d.job_id}`).then(r=>r.json());
        if(jr.status==="done"){ clearInterval(pollerRef.current); setStatus("done"); setResult(jr); }
        else if(jr.status==="error"){ clearInterval(pollerRef.current); setStatus("error"); setResult({result:{error:jr.error||"Unknown"}}); }
      },1500);
    } catch(e){ setStatus("error"); }
  }
  const dotC = {idle:"#D1D5DB",running:"#F59E0B",done:"#16A34A",error:"#DC2626"}[status];
  return (
    <div style={{background:"white",border:"1px solid #E5E7EB",borderRadius:10,padding:14,display:"flex",flexDirection:"column",gap:6}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1}}>
          <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:cfg.bg,color:cfg.color}}>{cfg.source}</span>
          <div style={{fontSize:13,fontWeight:600,color:"#111827",marginTop:5,lineHeight:1.3}}>{cfg.variable}</div>
        </div>
        <div style={{width:9,height:9,borderRadius:"50%",background:dotC,flexShrink:0,marginTop:2}}/>
      </div>
      <div style={{fontSize:11,color:"#9CA3AF"}}>{cfg.freq}</div>
      <ResultPreview result={result}/>
      <button onClick={run} disabled={status==="running"} style={{marginTop:4,padding:"7px 0",border:"none",borderRadius:7,cursor:status==="running"?"not-allowed":"pointer",background:status==="running"?"#F3F4F6":"#111827",color:status==="running"?"#9CA3AF":"white",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        {status==="running"?<><span style={{display:"inline-block",width:10,height:10,border:"2px solid #9CA3AF",borderTopColor:"#6B7280",borderRadius:"50%",animation:"spin .6s linear infinite"}}/> Scraping...</>:"Scrape Now"}
      </button>
    </div>
  );
}

function DataSourcesPanel({ firmId }) {
  const [lastResults, setLastResults] = useState({});
  const [running, setRunning] = useState(false);
  const [doneCount, setDoneCount] = useState(0);
  const pollerRef = useRef(null);
  useEffect(()=>{
    if(!firmId) return;
    fetch(`${API}/firms/${firmId}/scrape_results`).then(r=>r.json()).then(data=>{
      const map={}; data.forEach(r=>{ map[r.source_key]=r; }); setLastResults(map);
    }).catch(()=>{});
  },[firmId]);
  async function scrapeAll() {
    if(!firmId) return;
    setRunning(true); setDoneCount(0);
    try {
      const d = await fetch(`${API}/scrape_all`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({firm_id:firmId,source_key:""})}).then(r=>r.json());
      if(d.jobs){
        const ids = d.jobs.map(j=>j.job_id);
        pollerRef.current = setInterval(async()=>{
          let done=0;
          for(const id of ids){ const jr=await fetch(`${API}/scrape_jobs/${id}`).then(r=>r.json()).catch(()=>({})); if(jr.status==="done"||jr.status==="error") done++; }
          setDoneCount(done);
          if(done>=ids.length){ clearInterval(pollerRef.current); setRunning(false); }
        },2000);
      }
    } catch(e){ setRunning(false); }
  }
  useEffect(()=>()=>{ if(pollerRef.current) clearInterval(pollerRef.current); },[]);
  return (
    <div style={{padding:"20px 24px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#111827"}}>Data Sources <span style={{fontSize:12,color:"#9CA3AF",fontWeight:400}}>· {SCRAPER_CONFIG.length} sources</span></div>
        <button onClick={scrapeAll} disabled={running||!firmId} style={{padding:"7px 14px",border:"none",borderRadius:8,cursor:(running||!firmId)?"not-allowed":"pointer",background:(running||!firmId)?"#F3F4F6":"#111827",color:(running||!firmId)?"#9CA3AF":"white",fontSize:12,fontWeight:700}}>
          {running?`Running (${doneCount}/${SCRAPER_CONFIG.length})...`:"Scrape All"}
        </button>
      </div>
      {!firmId && <div style={{fontSize:13,color:"#9CA3AF",textAlign:"center",padding:"20px 0"}}>Add firm to pipeline first to run scrapers</div>}
      {firmId && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{SCRAPER_CONFIG.map(cfg=><ScraperCard key={cfg.key} cfg={cfg} firmId={firmId} lastResult={lastResults[cfg.key]||null}/>)}</div>}
    </div>
  );
}

// ── Outreach Panel ────────────────────────────────────────────────────────────
// ── Outreach Panel ────────────────────────────────────────────────────────────
// Simplified — AI analysis now lives in Overview. This panel just handles email.
function OutreachPanel({ firm, enriched, insights }) {
  const [loading,   setLoading]   = useState(false);
  const [contact,   setContact]   = useState(null);
  const [draft,     setDraft]     = useState("");
  const [draftText, setDraftText] = useState("");
  const [editMode,  setEditMode]  = useState(false);
  const [copied,    setCopied]    = useState(false);
  const [error,     setError]     = useState("");
  const [showDraft, setShowDraft] = useState(false);
  const [aiReady,   setAiReady]   = useState(null);

  useEffect(() => {
    fetch("/api/ai-status").then(r=>r.json()).then(d=>setAiReady(d.ready)).catch(()=>setAiReady(false));
  }, []);

  function generateLocalDraft() {
    const leaderName = enriched?.leader?.name || firm.founder_name || insights?.best_contact_guess || "";
    const firstName  = leaderName ? leaderName.split(",")[0].split(" ")[0] : "there";
    const email      = enriched?.leader?.email || "";
    const pa         = firm.practice_areas?.[0] || "personal injury";
    const location   = `${firm.city}, ${firm.state}`;
    const comm       = insights?.community_focus || "";
    const hook       = insights?.outreach_hooks?.[0] || "";
    const subject    = `Partnership Opportunity for ${firm.name} — LEA Investment`;
    const body =
`Dear ${firstName},

My name is [Your Name], and I'm reaching out from LEA Investment — a firm that specialises in partnering with and acquiring leading ${pa} law firms across the United States.

We've been tracking high-quality firms in ${location}${comm ? `, and ${firm.name}'s focus on ${comm} stood out to us` : ` and ${firm.name} stood out as a strong candidate`}.
${hook ? "\n" + hook + "\n" : ""}
We work with founding partners to provide liquidity, growth capital, and a clear succession pathway — without disrupting day-to-day operations.

Would you have 20 minutes for a confidential call this week?

Best regards,
[Your Name]
LEA Investment`;
    setDraft(body); setDraftText(body); setShowDraft(true);
    if (email) window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  async function runAIEmail() {
    setLoading(true); setError(""); setShowDraft(false);
    try {
      const resp = await fetch("/api/ai-outreach", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          firm_name: firm.name, city: firm.city, state: firm.state||"",
          website: firm.website||enriched?.website||"",
          contact_name: enriched?.leader?.name||insights?.best_contact_guess||"",
          sender_name: "[Your Name]",
          insights: insights||{},
        }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail||"Email generation failed");
      setDraft(data.email||""); setDraftText(data.email||""); setShowDraft(true);
    } catch(e) { setError(e.message); generateLocalDraft(); }
    finally    { setLoading(false); }
  }

  async function findContactAndDraft() {
    if (!firm.pipeline_id) { generateLocalDraft(); return; }
    setLoading(true); setError(""); setContact(null); setShowDraft(false);
    try {
      const r = await fetch(`${API}/firms/${firm.pipeline_id}/contact`);
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json(); setContact(data);
      const r2 = await fetch(`${API}/firms/${firm.pipeline_id}/draft-email`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ firm_id:firm.pipeline_id, leader_name:data.leader?.name||"" }),
      });
      const d2 = await r2.json();
      setDraft(d2.draft||""); setDraftText(d2.draft||""); setShowDraft(true);
    } catch(e) { setError(e.message||"Error"); generateLocalDraft(); }
    finally    { setLoading(false); }
  }

  function handleCopy() {
    navigator.clipboard.writeText(editMode?draftText:draft);
    setCopied(true); setTimeout(()=>setCopied(false),2000);
  }

  return (
    <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:14}}>
      <div>
        <div style={{fontSize:14,fontWeight:700,color:"#111827",marginBottom:3}}>Email Outreach</div>
        <div style={{fontSize:12,color:"#6B7280"}}>Personalised acquisition pitch for {firm.name}.</div>
        {insights && (
          <div style={{marginTop:8,background:"#EEF2FF",borderRadius:7,padding:"8px 12px",fontSize:11,color:"#4F46E5",fontWeight:600}}>
            {(insights.outreach_hooks||[]).length} AI hooks loaded from website analysis
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:8}}>
        {aiReady && (
          <button onClick={runAIEmail} disabled={loading}
            style={{flex:1,padding:"10px 0",border:"none",borderRadius:9,cursor:loading?"not-allowed":"pointer",
              background:loading?"#F3F4F6":"linear-gradient(135deg,#4F46E5,#7C3AED)",
              color:loading?"#9CA3AF":"white",fontSize:13,fontWeight:800,
              display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
            {loading?<><Spinner size={13}/> Writing…</>:"Draft AI Email"}
          </button>
        )}
        <button onClick={()=>aiReady?findContactAndDraft():generateLocalDraft()} disabled={loading}
          style={{flex:aiReady?0:1,padding:"10px 12px",border:"1px solid #E5E7EB",borderRadius:9,
            cursor:loading?"not-allowed":"pointer",background:loading?"#F3F4F6":"white",
            color:loading?"#9CA3AF":"#374151",fontSize:13,fontWeight:700,whiteSpace:"nowrap",
            display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
          {loading&&!aiReady?<><Spinner size={13}/> Loading…</>:aiReady?"Template":"Find Contact & Draft"}
        </button>
      </div>

      {error && <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#DC2626"}}>{error}</div>}

      {contact && (
        <div style={{background:"#F8FAFC",border:"1px solid #E5E7EB",borderRadius:10,padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Contact Found</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:contact.contact?.email?10:0}}>
            <FirmAvatar name={contact.leader?.name||"?"} size={38}/>
            <div>
              <div style={{fontSize:14,fontWeight:700}}>{contact.leader?.name||"Name not found"}</div>
              <div style={{fontSize:11,color:"#6B7280"}}>{contact.leader?.title||"Managing Partner"}</div>
            </div>
          </div>
          {contact.contact?.email && (
            <div style={{borderTop:"1px solid #E5E7EB",paddingTop:10}}>
              <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,marginBottom:4}}>EMAIL</div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <code style={{fontSize:12,fontWeight:600,color:"#111827",background:"white",border:"1px solid #E5E7EB",borderRadius:6,padding:"3px 10px"}}>{contact.contact.email}</code>
                <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,
                  background:contact.contact.confidence>=80?"#F0FDF4":"#FFFBEB",
                  color:contact.contact.confidence>=80?"#16A34A":"#D97706"}}>
                  {contact.contact.confidence||0}% confidence
                </span>
              </div>
            </div>
          )}
        </div>
      )}

      {showDraft && draft && (
        <div style={{border:"1px solid #E5E7EB",borderRadius:10,overflow:"hidden"}}>
          <div style={{background:"#F8FAFC",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #E5E7EB"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:13,fontWeight:700}}>Email Draft</span>
              {insights && <span style={{fontSize:10,fontWeight:700,background:"#EEF2FF",color:"#4F46E5",padding:"2px 7px",borderRadius:10}}>AI personalised</span>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditMode(!editMode)} style={{fontSize:11,padding:"4px 10px",borderRadius:6,cursor:"pointer",border:"1px solid #E5E7EB",background:"white",color:"#374151",fontWeight:600}}>{editMode?"Preview":"Edit"}</button>
              <button onClick={handleCopy} style={{fontSize:11,padding:"4px 12px",borderRadius:6,cursor:"pointer",border:"none",background:copied?"#16A34A":"#111827",color:"white",fontWeight:700}}>{copied?"Copied!":"Copy"}</button>
            </div>
          </div>
          {editMode
            ? <textarea value={draftText} onChange={e=>setDraftText(e.target.value)} style={{width:"100%",minHeight:280,padding:16,fontSize:12,lineHeight:1.7,border:"none",resize:"vertical",color:"#111827"}}/>
            : <pre style={{margin:0,padding:16,fontSize:12,lineHeight:1.7,color:"#111827",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:320,overflowY:"auto",fontFamily:"inherit"}}>{draft}</pre>
          }
        </div>
      )}
    </div>
  );
}

// ── Firm Detail Panel ──────────────────────────────────────────────────────────
function FirmDetailPanel({ firm, watchlist, onToggleWatchlist, currentUser }) {
  const [enriched,    setEnriched]    = useState(null);
  const [loading,     setLoading]     = useState(false);
  const [tab,         setTab]         = useState("overview");
  const [pipelineId,  setPipelineId]  = useState(null);
  // AI state — lifted here so Overview and Outreach both share it
  const [insights,       setInsights]       = useState(null);
  const [aiLoading,      setAiLoading]      = useState(false);
  const [aiError,        setAiError]        = useState("");
  const [aiReady,        setAiReady]        = useState(null);
  const [foundWebsite,   setFoundWebsite]   = useState("");   // auto-discovered URL
  const [websiteSearching,setWebsiteSearching] = useState(false);
  const [manualWebsite,  setManualWebsite]  = useState("");   // user-entered override
  // Investment score state
  const [scoreData,      setScoreData]      = useState(null);
  const [scoreLoading,   setScoreLoading]   = useState(false);
  // Google Sheets link state
  const [sheetLinked,   setSheetLinked]   = useState(false);
  const [sheetLinking,  setSheetLinking]  = useState(false);

  const isWatchlisted = watchlist.some(w => w.name===firm.name && w.city===firm.city);

  // Check AI availability once
  useEffect(() => {
    fetch("/api/ai-status").then(r=>r.json()).then(d=>setAiReady(d.ready)).catch(()=>setAiReady(false));
  }, []);

  // Enrich firm data when selection changes, then auto-find website if missing
  useEffect(()=>{
    setEnriched(null); setLoading(true); setTab("overview");
    setPipelineId(null); setInsights(null); setAiError("");
    setFoundWebsite(""); setManualWebsite("");
    setScoreData(null); setScoreLoading(false);
    setSheetLinked(false); setSheetLinking(false);

    fetch(`${API}/discover/enrich`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name:firm.name, website:firm.website||"", city:firm.city, state:firm.state, practice_area:firm.practice_areas?.[0]||"personal injury"})
    }).then(r=>r.json()).then(d=>{
      setEnriched(d);
      setLoading(false);
      // Auto-find website if neither the firm data nor enrichment has one
      const hasUrl = !!(firm.website || d?.website);
      if (!hasUrl) {
        setWebsiteSearching(true);
        fetch("/api/find-website", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({firm_name:firm.name, city:firm.city, state:firm.state})
        }).then(r=>r.json()).then(wd=>{
          if (wd.found && wd.website) {
            setFoundWebsite(wd.website);
            // Auto-trigger AI once website is found
            autoRunAI(wd.website);
          }
        }).catch(()=>{}).finally(()=>setWebsiteSearching(false));
      } else {
        // Website already known — auto-trigger AI immediately
        autoRunAI(firm.website || d?.website || "");
      }
    }).catch(()=>setLoading(false));
  },[firm.name, firm.city]);

  async function ensurePipeline() {
    if (pipelineId) return pipelineId;
    const resp = await fetch(`${API}/firms`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:firm.name,city:firm.city,state:firm.state,website:firm.website||"",attorney_count:0,notes:`Discovered via LEA · ${firm.source||""}`})});
    const d = await resp.json();
    if (d.id) { setPipelineId(d.id); return d.id; }
    return null;
  }

  // Auto-run AI silently when firm loads (no error UI, just fills in if successful)
  async function autoRunAI(websiteUrl) {
    if (!websiteUrl) return;
    try {
      const resp = await fetch("/api/ai-analyze", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          firm_name: firm.name, city: firm.city, state: firm.state||"",
          website: websiteUrl,
          google_review_snippets:[],
        }),
      });
      const data = await resp.json();
      if (resp.ok && !data.error) {
        setInsights(data);
        scoreThisFirm(data);
      }
    } catch(e) { /* silent fail — user can still click manually */ }
  }

  async function runAIAnalysis() {
    setAiLoading(true); setAiError(""); setInsights(null);
    try {
      const resp = await fetch("/api/ai-analyze", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          firm_name: firm.name, city: firm.city, state: firm.state||"",
          website: effectiveWebsite,
          google_review_snippets:[],
        }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail||"Analysis failed");
      if (data.error && !data.community_focus) throw new Error(data.error);
      setInsights(data);
      // Auto-trigger investment score after AI analysis
      scoreThisFirm(data);
    } catch(e) { setAiError(e.message); }
    finally    { setAiLoading(false); }
  }

  async function linkToSheet() {
    setSheetLinking(true);
    try {
      const firmData = {...firm, ...(enriched||{}), founder_name: enriched?.leader?.name || firm.founder_name || ""};
      const resp = await fetch("/api/link-to-sheet", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({firm: firmData, username: currentUser || "Unknown", channel: "Cold Call"})
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || "Failed");
      setSheetLinked(true);
    } catch(e) {
      alert("Sheet link failed: " + e.message);
    } finally {
      setSheetLinking(false);
    }
  }

  async function scoreThisFirm(insightsData) {
    setScoreLoading(true);
    try {
      const resp = await fetch('/api/score-firm', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ firm: {...firm, ...enriched}, insights: insightsData }),
      });
      const data = await resp.json();
      if (resp.ok) setScoreData(data);
    } catch(e) { console.error('score error', e); }
    finally { setScoreLoading(false); }
  }

  const effectiveWebsite = manualWebsite.trim() || firm.website || enriched?.website || foundWebsite || "";
  const hasWebsite = !!effectiveWebsite;

  const Row = ({label,value}) => value ? (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"9px 0",borderBottom:"1px solid #F3F4F6"}}>
      <span style={{fontSize:12,color:"#6B7280",flex:"0 0 148px"}}>{label}</span>
      <span style={{fontSize:12,color:"#111827",fontWeight:500,textAlign:"right",flex:1}}>{value}</span>
    </div>
  ) : null;

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden",animation:"slideRight 0.2s ease"}}>

      {/* ── Header ── */}
      <div style={{padding:"20px 24px 16px",background:"linear-gradient(135deg,#111827 0%,#1e3a5f 100%)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:14}}>
          <FirmAvatar name={firm.name} size={48} fontSize={20} bg="rgba(255,255,255,0.14)"/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:17,fontWeight:800,color:"white",lineHeight:1.2}}>{firm.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:5,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"rgba(255,255,255,0.55)"}}>📍 {firm.city}, {firm.state}</span>
              {firm.google_stars>0 && <span style={{fontSize:12,color:"rgba(255,255,255,0.75)",display:"inline-flex",alignItems:"center",gap:4}}><span style={{color:"#F59E0B",fontWeight:700}}>{firm.google_stars.toFixed(1)}</span><span style={{color:"rgba(255,255,255,0.45)"}}>({(firm.google_review_count||0).toLocaleString()} {firm.rating_source||"Google"} reviews)</span></span>}
              {firm.active_cases>0 && <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,background:"rgba(16,185,129,0.2)",color:"#6EE7B7"}}>{firm.active_cases} cases</span>}
            </div>
          </div>
        </div>
        {/* Score badge row */}
        {(scoreData || scoreLoading) && (
          <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
            {scoreLoading && !scoreData && (
              <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.07)",borderRadius:8,padding:"7px 12px",flex:1}}>
                <Spinner size={11} color="#818CF8"/>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.45)"}}>Calculating investment score…</span>
              </div>
            )}
            {scoreData && (() => {
              const s = scoreData.score || 0;
              const g = scoreData.grade || "—";
              const bg = s>=85?"#059669":s>=70?"#D97706":s>=55?"#EA580C":"#DC2626";
              const action = scoreData.recommended_action||"Review";
              const actionColor = action==="Invest Now"?"#6EE7B7":action==="Strong Consider"?"#86EFAC":action==="Monitor"?"#FCD34D":"#FCA5A5";
              return (
                <div style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.07)",borderRadius:10,padding:"10px 14px",flex:1,border:"1px solid rgba(255,255,255,0.1)"}}>
                  <div style={{width:46,height:46,borderRadius:"50%",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,border:"2px solid rgba(255,255,255,0.2)"}}>
                    <div style={{fontSize:15,fontWeight:900,color:"white",lineHeight:1}}>{s}</div>
                    <div style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,0.75)",letterSpacing:"0.04em"}}>{g}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Investment Score</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.88)",lineHeight:1.35,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{scoreData.investment_thesis||""}</div>
                  </div>
                  <span style={{fontSize:9,fontWeight:800,padding:"3px 8px",borderRadius:6,background:"rgba(0,0,0,0.25)",color:actionColor,flexShrink:0,textAlign:"center",lineHeight:1.3}}>{action}</span>
                </div>
              );
            })()}
          </div>
        )}
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <button onClick={linkToSheet} disabled={sheetLinking||sheetLinked}
            style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:sheetLinked?"default":sheetLinking?"not-allowed":"pointer",
              background:sheetLinked?"rgba(16,185,129,0.2)":sheetLinking?"rgba(255,255,255,0.08)":"rgba(52,211,153,0.15)",
              color:sheetLinked?"#6EE7B7":sheetLinking?"rgba(255,255,255,0.35)":"#6EE7B7",
              fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"1px solid rgba(52,211,153,0.3)"}}>
            {sheetLinking ? <><Spinner size={11} color="#6EE7B7"/>Linking…</> : sheetLinked ? "✓ Added to Sheet" : "Link to Sheet"}
          </button>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setTab("outreach")} style={{flex:1,padding:"8px 0",border:"none",borderRadius:8,background:"white",color:"#111827",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            ✉ Draft Email
          </button>
          <button onClick={()=>onToggleWatchlist(firm)} style={{flex:1,padding:"8px 0",border:`1.5px solid ${isWatchlisted?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.25)"}`,borderRadius:8,background:isWatchlisted?"rgba(22,163,74,0.2)":"transparent",color:isWatchlisted?"#86EFAC":"rgba(255,255,255,0.85)",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill={isWatchlisted?"#86EFAC":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            {isWatchlisted?"Watchlisted":"Add to Watchlist"}
          </button>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{display:"flex",borderBottom:"1px solid #F3F4F6",background:"white",flexShrink:0}}>
        {[["overview","Overview"],["datasources","Data Sources"],["outreach","Outreach"]].map(([t,label])=>(
          <button key={t}
            onClick={t==="datasources"?async()=>{setTab("datasources");if(!pipelineId)await ensurePipeline();}:()=>setTab(t)}
            style={{padding:"11px 18px",border:"none",background:"none",cursor:"pointer",fontSize:13,
              fontWeight:tab===t?700:500,color:tab===t?"#111827":"#6B7280",
              borderBottom:tab===t?"2px solid #111827":"2px solid transparent",marginBottom:-1}}>
            {label}
          </button>
        ))}
      </div>

      {/* ── Content ── */}
      <div style={{flex:1,overflowY:"auto",background:"white"}}>

        {/* OVERVIEW TAB */}
        {tab==="overview" && (
          <div>
            {loading && (
              <div style={{padding:"40px 24px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
                <Spinner/><div style={{fontSize:13,color:"#6B7280"}}>Researching {firm.name}…</div>
              </div>
            )}
            {!loading && (
              <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>

                {/* ── INVESTMENT SCORE BLOCK ── */}
                {scoreData && (() => {
                  const s = scoreData.score||0;
                  const g = scoreData.grade||"—";
                  const bg = s>=85?"#059669":s>=70?"#D97706":s>=55?"#EA580C":"#DC2626";
                  const subs = scoreData.sub_scores||{};
                  const subLabels = {client_volume:"Client Volume",reputation:"Reputation",scale:"Scale",market_activity:"Market Activity",acquisition_readiness:"Acq. Readiness"};
                  return (
                    <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a5f)",borderRadius:12,padding:"16px 18px",border:"1px solid rgba(255,255,255,0.08)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                        <div style={{width:52,height:52,borderRadius:"50%",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,border:"2px solid rgba(255,255,255,0.15)",boxShadow:"0 0 0 4px "+bg+"33"}}>
                          <div style={{fontSize:18,fontWeight:900,color:"white",lineHeight:1}}>{s}</div>
                          <div style={{fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.8)"}}>{g}</div>
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:800,color:"white"}}>Investment Score</div>
                          {scoreData.recommended_action && (() => {
                            const a = scoreData.recommended_action;
                            const ac = a==="Invest Now"?"#6EE7B7":a==="Strong Consider"?"#86EFAC":a==="Monitor"?"#FCD34D":"#FCA5A5";
                            return <span style={{fontSize:10,fontWeight:700,color:ac,background:"rgba(0,0,0,0.3)",borderRadius:5,padding:"2px 8px",marginTop:3,display:"inline-block"}}>{a}</span>;
                          })()}
                        </div>
                        <button onClick={()=>scoreThisFirm(insights)} disabled={scoreLoading}
                          style={{fontSize:10,fontWeight:700,padding:"5px 10px",borderRadius:6,border:"1px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.6)",cursor:"pointer"}}>
                          {scoreLoading?"…":"↻ Re-score"}
                        </button>
                      </div>

                      {scoreData.investment_thesis && (
                        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",marginBottom:10,borderLeft:"3px solid "+bg}}>
                          <div style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>Investment Thesis</div>
                          <div style={{fontSize:12,color:"rgba(255,255,255,0.88)",lineHeight:1.55}}>{scoreData.investment_thesis}</div>
                        </div>
                      )}

                      {Object.keys(subs).filter(k=>k!=="lea_bonus").length>0 && (
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Sub-Scores</div>
                          <div style={{display:"flex",flexDirection:"column",gap:5}}>
                            {Object.entries(subs).filter(([k])=>k!=="lea_bonus"&&subLabels[k]).map(([k,v])=>(
                              <div key={k}>
                                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                                  <span style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>{subLabels[k]||k}</span>
                                  <span style={{fontSize:10,fontWeight:700,color:v>=70?"#6EE7B7":v>=50?"#FCD34D":"#FCA5A5"}}>{v}</span>
                                </div>
                                <div style={{height:4,background:"rgba(255,255,255,0.1)",borderRadius:3}}>
                                  <div style={{height:4,borderRadius:3,width:(Math.min(100,v))+"%",background:v>=70?"#059669":v>=50?"#D97706":"#DC2626",transition:"width 0.5s ease"}}/>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      <div style={{display:"flex",gap:8}}>
                        {scoreData.key_strengths?.length>0 && (
                          <div style={{flex:1,background:"rgba(16,185,129,0.08)",borderRadius:7,padding:"8px 10px"}}>
                            <div style={{fontSize:9,fontWeight:800,color:"#6EE7B7",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Strengths</div>
                            {scoreData.key_strengths.map((s,i)=>(
                              <div key={i} style={{fontSize:10,color:"rgba(255,255,255,0.75)",marginBottom:2,display:"flex",gap:5}}>
                                <span style={{color:"#6EE7B7",flexShrink:0}}>+</span>{s}
                              </div>
                            ))}
                          </div>
                        )}
                        {scoreData.key_risks?.length>0 && (
                          <div style={{flex:1,background:"rgba(239,68,68,0.08)",borderRadius:7,padding:"8px 10px"}}>
                            <div style={{fontSize:9,fontWeight:800,color:"#FCA5A5",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Risks</div>
                            {scoreData.key_risks.map((r,i)=>(
                              <div key={i} style={{fontSize:10,color:"rgba(255,255,255,0.75)",marginBottom:2,display:"flex",gap:5}}>
                                <span style={{color:"#FCA5A5",flexShrink:0}}>−</span>{r}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })()}

                {!scoreData && !scoreLoading && insights && (
                  <div style={{display:"flex",justifyContent:"center"}}>
                    <button onClick={()=>scoreThisFirm(insights)} style={{padding:"7px 18px",borderRadius:8,border:"1px solid #E5E7EB",background:"white",color:"#374151",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                      🏆 Generate Investment Score
                    </button>
                  </div>
                )}

                {/* ── AI INSIGHTS BLOCK — primary feature ── */}
                <div style={{background:"linear-gradient(135deg,#1e1b4b,#312e81)",borderRadius:12,padding:"16px 18px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#818CF8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:800,color:"white"}}>AI Firm Intelligence</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:1}}>
                        {aiReady===false
                          ? "Add GROQ_API_KEY to .env to enable"
                          : !hasWebsite
                            ? "No website found — insights unavailable"
                            : websiteSearching
                            ? "Searching for website…"
                            : insights
                              ? `${insights.pages_fetched||0} pages analysed · ${(insights.confidence||"low").toUpperCase()} confidence`
                              : foundWebsite
                                ? `Website found: ${foundWebsite}`
                                : "Reads the firm's website to find personalisation hooks for your outreach"}
                      </div>
                    </div>
                    {insights && (
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,
                        background:insights.confidence==="high"?"rgba(16,185,129,0.25)":insights.confidence==="medium"?"rgba(251,191,36,0.25)":"rgba(107,114,128,0.2)",
                        color:insights.confidence==="high"?"#6EE7B7":insights.confidence==="medium"?"#FCD34D":"#9CA3AF"}}>
                        {(insights.confidence||"low").toUpperCase()}
                      </span>
                    )}
                  </div>

                  {aiError && (
                    <div style={{background:"rgba(220,38,38,0.15)",border:"1px solid rgba(220,38,38,0.3)",borderRadius:7,padding:"8px 12px",fontSize:11,color:"#FCA5A5",marginBottom:10}}>
                      ⚠ {aiError}
                    </div>
                  )}

                  {/* Insights cards */}
                  {insights && (
                    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>

                      {insights.website_language && insights.website_language!=="English" && (
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,background:"rgba(99,102,241,0.3)",color:"#A5B4FC"}}>
                            🌐 {insights.website_language}
                          </span>
                        </div>
                      )}

                      {insights.community_focus && (
                        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #818CF8"}}>
                          <div style={{fontSize:9,fontWeight:800,color:"#818CF8",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Community Focus</div>
                          <div style={{fontSize:12,color:"rgba(255,255,255,0.88)",lineHeight:1.5}}>{insights.community_focus}</div>
                        </div>
                      )}

                      {insights.unique_differentiators?.length>0 && (
                        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #34D399"}}>
                          <div style={{fontSize:9,fontWeight:800,color:"#34D399",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>What Makes Them Unique</div>
                          {insights.unique_differentiators.map((d,i)=>(
                            <div key={i} style={{fontSize:11,color:"rgba(255,255,255,0.82)",marginBottom:3,display:"flex",gap:6}}>
                              <span style={{color:"#34D399",flexShrink:0}}>•</span>{d}
                            </div>
                          ))}
                        </div>
                      )}

                      {insights.notable_results?.length>0 && (
                        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #FBBF24"}}>
                          <div style={{fontSize:9,fontWeight:800,color:"#FBBF24",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>Notable Results</div>
                          {insights.notable_results.map((r,i)=>(
                            <div key={i} style={{fontSize:11,color:"rgba(255,255,255,0.82)",marginBottom:3,display:"flex",gap:6}}>
                              <span style={{color:"#FBBF24",flexShrink:0}}>★</span>{r}
                            </div>
                          ))}
                        </div>
                      )}

                      {insights.acquisition_signals?.length>0 && (
                        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #F87171"}}>
                          <div style={{fontSize:9,fontWeight:800,color:"#F87171",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>Acquisition Signals</div>
                          {insights.acquisition_signals.map((s,i)=>(
                            <div key={i} style={{fontSize:11,color:"rgba(255,255,255,0.82)",marginBottom:3,display:"flex",gap:6}}>
                              <span style={{color:"#F87171",flexShrink:0}}>⚡</span>{s}
                            </div>
                          ))}
                        </div>
                      )}

                      {insights.outreach_hooks?.length>0 && (

                      );
                    }
                    if(m.custom==="linkedin") {
                      const range = enriched?.linkedin_headcount_range || (enriched?.linkedin_headcount ? `${enriched.linkedin_headcount} employees` : null);
                      const followers = enriched?.linkedin_followers_label || (enriched?.linkedin_followers ? `${enriched.linkedin_followers.toLocaleString()}` : null);
                      const profileUrl = enriched?.linkedin_profile_url;
                      return (
                        <div key={m.label} style={{background:"#F8FAFC",borderRadius:10,padding:"12px 14px"}}>

                          </div>
                          {range || followers ? (
                            <div>
                              {range && <div style={{fontSize:14,fontWeight:600,color:"#111827"}}>{range}</div>}
                              {followers && <div style={{fontSize:11,color:"#6B7280",marginTop:2}}>{followers} followers</div>}
                            </div>
                          ) : (
                            <div style={{fontSize:14,fontWeight:600,color:"#111827"}}>–</div>
                          )}
                        </div>
                      );
                    }
                    return (
                    <div key={m.label} style={{background:"#F8FAFC",borderRadius:10,padding:"12px 14px"}}>
                      <div style={{fontSize:10,color:"#9CA3AF",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{m.label}</div>
                      <div style={{fontSize:14,fontWeight:m.accent?800:600,color:"#111827"}}>{m.value}</div>
                    </div>
                    );
                  })}
                </div>

                {/* ── Firm details table ── */}
                <div style={{background:"white",border:"1px solid #E5E7EB",borderRadius:10,overflow:"hidden"}}>
                  <div style={{padding:"9px 16px",background:"#F8FAFC",borderBottom:"1px solid #E5E7EB",fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.05em"}}>Firm Details</div>
                  <div style={{padding:"0 16px"}}>
                    <Row label="Cities / Offices" value={enriched?.office_locations?.length>0?enriched.office_locations.join(", "):`${firm.city}, ${firm.state}`}/>
                    <Row label="Practice Areas"   value={(enriched?.practice_areas_detected?.length>0?enriched.practice_areas_detected:firm.practice_areas||[]).map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(", ")||"–"}/>
                    <Row label="Phone"            value={firm.phone||"–"}/>
                    <Row label="CRM Detected"     value={enriched?.crm_detected||"–"}/>
                    <Row label="Website"          value={firm.website||enriched?.website||"–"}/>
                    {firm.google_stars>0 && <Row label={`${firm.rating_source||"Google"} Rating`} value={`${firm.google_stars.toFixed(1)} ★ (${(firm.google_review_count||0).toLocaleString()} reviews)`}/>}
                    {firm.lea_rank>0 && <Row label="LEA Market Rank" value={`#${firm.lea_rank} in ${firm.lea_market||firm.city}`}/>}
                  </div>
                </div>

              </div>
            )}
          </div>
        )}

        {tab==="datasources" && <DataSourcesPanel firmId={pipelineId}/>}
        {tab==="outreach"    && <OutreachPanel firm={{...firm,pipeline_id:pipelineId,website:effectiveWebsite}} enriched={enriched} insights={insights}/>}
      </div>
    </div>
  );
}

// ── Discover Page ──────────────────────────────────────────────────────────────
function DiscoverPage({ watchlist, onToggleWatchlist, currentUser,
  mode, setMode, form, setForm, cForm, setCForm,
  results, setResults, analytics, setAnalytics,
  selected, setSelected, error, setError }) {
  // loading + sort stay local — no need to persist these
  const [loading,       setLoading]       = useState(false);
  const [sortCol,       setSortCol]       = useState("active_cases");
  const [sortAsc,       setSortAsc]       = useState(false);
  const [ratingsStatus, setRatingsStatus] = useState(null);
  const [discoverSort,  setDiscoverSort]  = useState("reviews");
  const [discoverPage,  setDiscoverPage]  = useState(0);

  React.useEffect(()=>{
    fetch("/api/ratings-status").then(r=>r.json()).then(setRatingsStatus).catch(()=>{});
  }, []);

  async function doSearch(e) {
    e.preventDefault(); if(!form.city.trim()) return;
    setLoading(true); setError(""); setSelected(null); setDiscoverPage(0);
    try {
      const resp = await fetch(`${API}/discover`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...form,max_results:parseInt(form.max_results)})});
      if(!resp.ok) throw new Error(`Server error ${resp.status}`);
      setResults(await resp.json());
    } catch(e){ setError(e.message||"Discovery failed — is the backend running?"); }
    finally { setLoading(false); }
  }

  async function doCourt(e) {
    e.preventDefault(); if(!cForm.city.trim()) return;
    setLoading(true); setError(""); setSelected(null);
    try {
      const resp = await fetch(`${API}/court-analytics`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...cForm,days_back:parseInt(cForm.days_back)})});
      if(!resp.ok) throw new Error(`Server error ${resp.status}`);
      setAnalytics(await resp.json());
    } catch(e){ setError(e.message||"Court analytics failed"); }
    finally { setLoading(false); }
  }

  function toggleSort(col) {
    if(sortCol===col) setSortAsc(a=>!a);
    else { setSortCol(col); setSortAsc(false); }
  }

  const inp = s=>({padding:"8px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.22)",background:"rgba(255,255,255,0.11)",color:"white",fontSize:13,width:"100%",outline:"none",...s});

  const firmList = results?.results || [];
  const ratedFirms = firmList.filter(f => f.google_stars>0);
  const baseList = ratedFirms.length>0 ? ratedFirms : firmList;

  const PAGE_SIZE = 20;

  const SORT_OPTIONS = [
    { value:"reviews",  label:"Most Reviews"   },
    { value:"rating",   label:"Highest Rated"  },
    { value:"attorneys",label:"Most Attorneys" },
    { value:"cases",    label:"Active Cases"   },
    { value:"az",       label:"A → Z"          },
  ];
  const displayFirms = [...baseList].sort((a, b) => {
    if (discoverSort === "reviews")   return (b.google_review_count||0) - (a.google_review_count||0);
    if (discoverSort === "rating")    return (b.google_stars||0) - (a.google_stars||0);
    if (discoverSort === "attorneys") return (b.attorney_count||b.attorney_count_web||b.attorney_count_est||0) - (a.attorney_count||a.attorney_count_web||a.attorney_count_est||0);
    if (discoverSort === "cases")     return (b.active_cases||0) - (a.active_cases||0);
    if (discoverSort === "az")        return a.name.localeCompare(b.name);
    return 0;
  });
  const totalPages    = Math.ceil(displayFirms.length / PAGE_SIZE);
  const paginatedFirms = displayFirms.slice(discoverPage * PAGE_SIZE, (discoverPage + 1) * PAGE_SIZE);

  const courtFirms = analytics?.results ? [...analytics.results].sort((a,b)=>{
    const av=a[sortCol]??0, bv=b[sortCol]??0;
    return sortAsc ? (av>bv?1:-1) : (av<bv?1:-1);
  }) : [];

  const Th = ({col,children}) => (
    <th className="sortable" onClick={()=>toggleSort(col)} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.05em",whiteSpace:"nowrap",background:"#F8FAFC",borderBottom:"1px solid #E5E7EB"}}>
      {children}{sortCol===col?<span style={{marginLeft:4,color:"#111827"}}>{sortAsc?"↑":"↓"}</span>:null}
    </th>
  );

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Search bar */}
      <div style={{background:"linear-gradient(135deg,#111827,#1e3a5f)",padding:"10px 24px 10px",flexShrink:0}}>

        <div style={{display:"flex",gap:5,marginBottom:10}}>
          {[["search","Firm Discovery"],["court","Court Analytics"]].map(([m,lbl])=>(
            <button key={m} onClick={()=>{setMode(m);setSelected(null);}} style={{padding:"4px 11px",borderRadius:6,border:"none",cursor:"pointer",background:mode===m?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.1)",color:mode===m?"#111827":"rgba(255,255,255,0.65)",fontSize:11,fontWeight:mode===m?700:400,transition:"all 0.12s"}}>
              {lbl}
            </button>
          ))}
        </div>
        {mode==="search" && (
          <form onSubmit={doSearch}>

                              </button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {!loading && !results && !analytics && !error && (

              <div style={{fontSize:13,textAlign:"center",maxWidth:320,lineHeight:1.6}}>Enter a city and practice area above to discover firms. Shows firms with Google ratings first.</div>
            </div>
          )}
        </div>

        {/* Detail panel */}
        {selected && (
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <FirmDetailPanel firm={selected} watchlist={watchlist} onToggleWatchlist={onToggleWatchlist} currentUser={currentUser}/>
          </div>
        )}
      </div>
    </div>
  );
}

function HeatMapPage({ watchlist, onGoToDiscover, onSelectFirm }) {
  const svgRef       = React.useRef(null);
  const containerRef = React.useRef(null);

  const [topoData,      setTopoData]      = useState(null);

  const [tooltip,       setTooltip]       = useState(null);

  useEffect(() => {
    fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
      .then(r => r.json()).then(setTopoData).catch(() => {});

          const key = f.city+"|"+f.state;
          if (!byCity[key]) byCity[key] = [];
          byCity[key].push(f);
        });
        setCityData(byCity);
      }).catch(() => {});
  }, []);

  useEffect(() => {
    if (!containerRef.current) return;
    const obs = new ResizeObserver(entries => {
      const {width, height} = entries[0].contentRect;
      if (width > 0 && height > 0) setDims({w: width, h: height});
    });
    obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  const stateFirmCounts = React.useMemo(() => {
    const counts = {};
    LEA_CITIES.forEach(c => {
      const n = (cityData[c.city+"|"+c.state]||[]).length;
      counts[c.state] = (counts[c.state]||0) + n;
    });
    return counts;
  }, [cityData]);

  const maxCount = Math.max(...Object.values(stateFirmCounts), 1);

  useEffect(() => {
    if (!topoData || !svgRef.current || dims.w < 100) return;
    if (mapView === "country") drawCountry();
    else if (mapView === "state" && activeState) drawState();
  }, [topoData, cityData, mapView, activeState, dims, activeCity]);

  function drawCountry() {
    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();
    const {w:W, h:H} = dims;
    const proj = d3.geoAlbersUsa().scale(W * 1.18).translate([W/2, H/2]);
    const path = d3.geoPath().projection(proj);

    let statesFeature;
    try { statesFeature = topojson.feature(topoData, topoData.objects.states); }
    catch(e) { return; }

    const colorScale = d3.scaleSequential()
      .domain([0, maxCount])
      .interpolator(t => t === 0 ? "#EEF2FF" : d3.interpolateBlues(0.2 + t * 0.8));

    const stateG = svg.append("g");
    stateG.selectAll("path")
      .data(statesFeature.features)
      .join("path")
      .attr("d", path)
      .attr("fill", d => {
        const abbr = STATE_FIPS[String(d.id).padStart(2,"0")];
        return colorScale(stateFirmCounts[abbr]||0);
      })
      .attr("stroke", "white")
      .attr("stroke-width", 1.0)
      .style("cursor", d => {
        const abbr = STATE_FIPS[String(d.id).padStart(2,"0")];
        return (stateFirmCounts[abbr]||0) > 0 ? "pointer" : "default";
      })
      .on("mousemove", (event, d) => {
        const abbr = STATE_FIPS[String(d.id).padStart(2,"0")];
        const count = stateFirmCounts[abbr]||0;
        setTooltip({x: event.offsetX, y: event.offsetY, text: (STATE_NAMES[abbr]||abbr) + (count > 0 ? " — " + count + " firms" : " — no data")});
      })
      .on("mouseleave", () => setTooltip(null))
      .on("click", (event, d) => {
        const abbr = STATE_FIPS[String(d.id).padStart(2,"0")];
        if (!abbr || !stateFirmCounts[abbr]) return;
        setActiveState({abbr, name: STATE_NAMES[abbr]||abbr, feature: d});
        setActiveCity(null);
        setMapView("state");
        setTooltip(null);
      });

    // State abbreviation labels
    svg.append("g").selectAll("text")
      .data(statesFeature.features)
      .join("text")
      .attr("transform", d => { const c = path.centroid(d); return c && !isNaN(c[0]) ? "translate("+c[0]+","+c[1]+")" : "translate(-999,-999)"; })
      .attr("text-anchor","middle").attr("dy","0.35em")
      .attr("font-size", 9).attr("font-weight","700").attr("pointer-events","none")
      .attr("fill", d => {
        const abbr = STATE_FIPS[String(d.id).padStart(2,"0")];
        const count = stateFirmCounts[abbr]||0;
        return count > maxCount * 0.55 ? "white" : "#1e3a5f";
      })
      .text(d => STATE_FIPS[String(d.id).padStart(2,"0")]||"");
  }

  function drawState() {
    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();
    const {w:W, h:H} = dims;

    let proj;
    try {
      proj = d3.geoAlbersUsa().fitExtent([[60, 60], [W-60, H-80]], activeState.feature);
    } catch(e) {
      proj = d3.geoAlbersUsa().scale(W*1.18).translate([W/2, H/2]);
    }
    const path = d3.geoPath().projection(proj);

    // State fill + border
    svg.append("path").datum(activeState.feature)
      .attr("d", path)
      .attr("fill", "#DBEAFE")
      .attr("stroke", "#3B82F6")
      .attr("stroke-width", 2);

    const citiesInState = LEA_CITIES.filter(c => c.state === activeState.abbr);
    const counts = citiesInState.map(c => (cityData[c.city+"|"+c.state]||[]).length);
    const maxCity = Math.max(...counts, 1);
    const rScale = d3.scaleSqrt().domain([0, maxCity]).range([8, 32]);
    const colorScale = d3.scaleSequential()
      .domain([0, maxCity])
      .interpolator(t => d3.interpolateBlues(0.3 + t * 0.7));

    citiesInState.forEach(c => {
      const pt = proj([c.lng, c.lat]);
      if (!pt || isNaN(pt[0])) return;
      const firms = cityData[c.city+"|"+c.state]||[];
      if (firms.length === 0) return;
      const isActive = activeCity && activeCity.city === c.city;
      const r = rScale(firms.length);

      const g = svg.append("g")
        .attr("transform", "translate("+pt[0]+","+pt[1]+")")
        .style("cursor","pointer")
        .on("click", () => setActiveCity({city:c.city, state:c.state, firms}))
        .on("mousemove", event => setTooltip({x: event.offsetX, y: event.offsetY, text: c.city+" — "+firms.length+" firms (click to expand)"}))
        .on("mouseleave", () => setTooltip(null));

      // Outer glow
      g.append("circle").attr("r", r+6)
        .attr("fill", isActive ? "#FCD34D" : colorScale(firms.length))
        .attr("opacity", 0.25);
      // Main circle
      g.append("circle").attr("r", r)
        .attr("fill", isActive ? "#F59E0B" : colorScale(firms.length))
        .attr("stroke","white").attr("stroke-width", 2.5)
        .attr("opacity", 0.92);
      // Count label
      g.append("text")
        .attr("text-anchor","middle").attr("dy","0.35em")
        .attr("font-size", r > 18 ? 12 : 9)
        .attr("font-weight","900").attr("fill","white")
        .attr("pointer-events","none")
        .text(firms.length);
      // City name below
      g.append("text")
        .attr("text-anchor","middle").attr("y", r+13)
        .attr("font-size", 10).attr("font-weight","700")
        .attr("fill", isActive ? "#92400E" : "#1e3a5f")
        .attr("pointer-events","none")
        .text(c.city);
    });
  }

  const totalFirms   = Object.values(cityData).reduce((s,a) => s+a.length, 0);
  const coveredStates = Object.keys(stateFirmCounts).filter(k => stateFirmCounts[k]>0).length;

  return (
    <div ref={containerRef} style={{position:"relative",width:"100%",height:"100%",overflow:"hidden",background:"#0f172a"}}>
      <svg ref={svgRef} width="100%" height="100%" style={{display:"block"}}/>

      {/* Country stats bar */}
      {mapView === "country" && (
        <div style={{position:"absolute",top:16,left:16,display:"flex",gap:12,alignItems:"center"}}>
          <div style={{background:"rgba(255,255,255,0.1)",backdropFilter:"blur(8px)",borderRadius:10,padding:"10px 16px",border:"1px solid rgba(255,255,255,0.15)"}}>
            <div style={{fontSize:22,fontWeight:900,color:"white",lineHeight:1}}>{totalFirms}</div>
            <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.55)",textTransform:"uppercase",letterSpacing:"0.07em"}}>LEA Firms</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",backdropFilter:"blur(8px)",borderRadius:10,padding:"10px 16px",border:"1px solid rgba(255,255,255,0.15)"}}>
            <div style={{fontSize:22,fontWeight:900,color:"white",lineHeight:1}}>{coveredStates}</div>
            <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.55)",textTransform:"uppercase",letterSpacing:"0.07em"}}>States</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.08)",backdropFilter:"blur(8px)",borderRadius:10,padding:"10px 16px",border:"1px solid rgba(255,255,255,0.1)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.7)"}}>Click a state to drill in →</div>
          </div>
        </div>
      )}

      {/* Color legend */}
      {mapView === "country" && (
        <div style={{position:"absolute",bottom:20,right:20,background:"rgba(255,255,255,0.1)",backdropFilter:"blur(8px)",borderRadius:8,padding:"10px 14px",border:"1px solid rgba(255,255,255,0.15)"}}>
          <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.55)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Firm Density</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.5)"}}>Low</span>
            <div style={{width:80,height:8,borderRadius:4,background:"linear-gradient(to right, #EEF2FF, #1e40af)"}}/>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.5)"}}>High</span>
          </div>
        </div>
      )}

      {/* Back + state header */}
      {mapView === "state" && activeState && (
        <div style={{position:"absolute",top:16,left:16,display:"flex",alignItems:"center",gap:10}}>
          <button onClick={() => { setMapView("country"); setActiveState(null); setActiveCity(null); setTooltip(null); }}
            style={{padding:"8px 14px",borderRadius:8,border:"none",background:"rgba(255,255,255,0.15)",backdropFilter:"blur(8px)",color:"white",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6,border:"1px solid rgba(255,255,255,0.2)"}}>
            ← All States
          </button>
          <div style={{background:"rgba(255,255,255,0.12)",backdropFilter:"blur(8px)",borderRadius:8,padding:"8px 16px",border:"1px solid rgba(255,255,255,0.15)"}}>
            <span style={{fontSize:15,fontWeight:800,color:"white"}}>{activeState.name}</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginLeft:10}}>{stateFirmCounts[activeState.abbr]||0} firms · click a city</span>
          </div>
        </div>
      )}

      {/* Hover tooltip */}
      {tooltip && (
        <div style={{position:"absolute",left:tooltip.x+14,top:tooltip.y-10,background:"rgba(15,23,42,0.92)",color:"white",borderRadius:7,padding:"6px 12px",fontSize:11,fontWeight:700,pointerEvents:"none",border:"1px solid rgba(255,255,255,0.1)",backdropFilter:"blur(6px)",whiteSpace:"nowrap",zIndex:100}}>
          {tooltip.text}
        </div>
      )}

      {/* City firms panel */}
      {activeCity && (
        <div style={{position:"absolute",top:0,right:0,width:300,height:"100%",background:"white",boxShadow:"-6px 0 24px rgba(0,0,0,0.25)",display:"flex",flexDirection:"column",overflow:"hidden",zIndex:50}}>
          <div style={{padding:"16px 18px 12px",background:"linear-gradient(135deg,#1e3a5f,#1D4ED8)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:800,color:"white"}}>{activeCity.city}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:2}}>{activeCity.state} · {activeCity.firms.length} firms · click a firm to open full analysis</div>
              </div>
              <button onClick={() => setActiveCity(null)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:14,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
            {[...activeCity.firms]
              .sort((a,b) => (b.google_review_count||0)-(a.google_review_count||0))
              .map((f,i) => (
                <div key={i} onClick={()=>onSelectFirm && onSelectFirm(f)} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"9px 10px",borderRadius:9,marginBottom:6,background:"#F8FAFC",border:"1px solid #EFF3F7",cursor:"pointer",transition:"background 0.12s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#EFF6FF"}
                  onMouseLeave={e=>e.currentTarget.style.background="#F8FAFC"}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:i===0?"#1D4ED8":i<3?"#3B82F6":"#BFDBFE",color:i<3?"white":"#1D4ED8",fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                    {i+1}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                      {f.source==="LEA Research" && <span style={{fontSize:7,fontWeight:800,background:"#111827",color:"white",borderRadius:3,padding:"1px 4px",flexShrink:0}}>LEA</span>}
                    </div>
                    {f.google_stars > 0 && (
                      <div style={{fontSize:10,color:"#D97706",fontWeight:700,marginTop:2}}>
                        {"★"} {f.google_stars.toFixed(1)} <span style={{color:"#9CA3AF",fontWeight:400}}>({(f.google_review_count||0).toLocaleString()} reviews)</span>
                      </div>
                    )}
                    {f.lea_notes && (
                      <div style={{fontSize:10,color:"#6B7280",marginTop:2,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{f.lea_notes}</div>
                    )}
                  </div>
                  {f.lea_rank > 0 && (
                    <span style={{fontSize:8,fontWeight:700,padding:"2px 6px",borderRadius:4,background:"#EFF6FF",color:"#1D4ED8",flexShrink:0,marginTop:2}}>#{f.lea_rank}</span>
                  )}
                </div>
              ))}
          </div>
        </div>
      )}
    </div>
  );
}

                    Outreach →

            );
          })}
        </div>
      </div>
      {/* Detail panel */}
      {selected ? (
        <div style={{flex:1,overflow:"hidden"}}>
          <FirmDetailPanel firm={selected} watchlist={watchlist} onToggleWatchlist={onToggleWatchlist} currentUser={currentUser}/>
        </div>
      ) : watchlist.length>0 && (
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#9CA3AF"}}>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#E5E7EB" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          <div style={{fontSize:14,fontWeight:600,color:"#374151"}}>Select a firm to view details</div>
          <div style={{fontSize:13}}>Click any firm in the list to see its profile</div>
        </div>
      )}
    </div>
  );
}
